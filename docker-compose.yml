services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-huwacontrol}
      POSTGRES_USER:     ${POSTGRES_USER:-huwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huwacontrol}
    volumes:
      - huwacontrol_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-huwa} -d ${POSTGRES_DB:-huwacontrol}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - huwanet

  app:
    image: ghcr.io/realvladilena/huwacontrol:latest
    restart: unless-stopped
    environment:
      DB_HOST:           db
      DB_PORT:           "5432"
      POSTGRES_DB:       ${POSTGRES_DB:-huwacontrol}
      POSTGRES_USER:     ${POSTGRES_USER:-huwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huwacontrol}
      SECRET_KEY:        ${SECRET_KEY:-}
      SYSLOG_HOST_PORT:  ${SYSLOG_HOST_PORT:-514}
      SNMP_TRAP_PORT:    ${SNMP_TRAP_PORT:-1162}
    volumes:
      - huwacontrol_instance:/app/instance
    ports:
      - "${HTTP_PORT:-8080}:5000"
      - "${SYSLOG_HOST_PORT:-514}:1514/udp"
      - "${SNMP_TRAP_PORT:-1162}:1162/udp"
    cap_add:
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy
    networks:
      - huwanet

volumes:
  huwacontrol_db:
  huwacontrol_instance:

networks:
  huwanet:
    driver: bridge
