services:

  db:
    image: postgres:16-alpine
    container_name: huwacontrol_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-huwacontrol}
      POSTGRES_USER:     ${POSTGRES_USER:-huwa}
      # Par défaut "huwacontrol" — changez dans .env pour la production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huwacontrol}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-huwa} -d ${POSTGRES_DB:-huwacontrol}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks:
      - huwanet

  app:
    build: .
    container_name: huwacontrol_app
    restart: unless-stopped
    # .env optionnel — l'entrypoint génère les secrets si absent
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST:           db
      DB_PORT:           "5432"
      POSTGRES_DB:       ${POSTGRES_DB:-huwacontrol}
      POSTGRES_USER:     ${POSTGRES_USER:-huwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huwacontrol}
    volumes:
      - app_instance:/app/instance
    depends_on:
      db:
        condition: service_healthy
    cap_add:
      - NET_RAW
    expose:
      - "5000"
    ports:
      - "${SYSLOG_HOST_PORT:-514}:1514/udp"
      - "${SNMP_TRAP_PORT:-1162}:1162/udp"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks:
      - huwanet

  nginx:
    image: nginx:1.27-alpine
    container_name: huwacontrol_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }
    networks:
      - huwanet

volumes:
  pg_data:
    driver: local
  app_instance:
    driver: local

networks:
  huwanet:
    driver: bridge
