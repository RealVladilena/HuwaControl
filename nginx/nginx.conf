worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logs
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Cache fichiers statiques
    map $uri $cache_control {
        ~*\.(css|js)$   "public, max-age=86400";
        default         "no-cache";
    }

    upstream flask_app {
        server app:5000;
        keepalive 8;
    }

    # ── HTTP (port 80) ────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 1m;

        # Si HTTPS est activé, rediriger HTTP → HTTPS
        # (décommentez les 2 lignes ci-dessous et commentez le bloc location / )
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;

            add_header Cache-Control $cache_control;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ── HTTPS (port 443) — décommentez pour activer SSL ──────────────────────
    # Prérequis : placer vos certificats dans ./nginx/certs/
    #   - nginx/certs/cert.pem   (certificat)
    #   - nginx/certs/key.pem    (clé privée)
    # Générer un certificat auto-signé :
    #   mkdir -p nginx/certs
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout nginx/certs/key.pem -out nginx/certs/cert.pem \
    #     -subj "/CN=huwacontrol"
    # Puis dans docker-compose.yml ajouter :
    #   ports: ["443:443"]
    #   volumes: ["./nginx/certs:/etc/nginx/certs:ro"]
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #
    #     client_max_body_size 1m;
    #
    #     location / {
    #         proxy_pass         http://flask_app;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto https;
    #         proxy_set_header   Connection        "";
    #         proxy_read_timeout 60s;
    #         add_header Cache-Control $cache_control;
