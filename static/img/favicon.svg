<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff2222" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>

  <!-- Glow -->
  <circle cx="16" cy="16" r="13" fill="url(#glow)"/>

  <!-- Connection lines -->
  <line x1="16" y1="13" x2="16" y2="7"  stroke="#cc0000" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="25" y2="16" stroke="#cc0000" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="16" y2="25" stroke="#cc0000" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="13" y1="16" x2="7"  y2="16" stroke="#cc0000" stroke-width="1.4" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="16" cy="6"  r="2.2" fill="#cc0000" fill-opacity="0.65"/>
  <circle cx="26" cy="16" r="2.2" fill="#cc0000" fill-opacity="0.65"/>
  <circle cx="16" cy="26" r="2.2" fill="#cc0000" fill-opacity="0.65"/>
  <circle cx="6"  cy="16" r="2.2" fill="#cc0000" fill-opacity="0.65"/>

  <!-- Center node -->
  <circle cx="16" cy="16" r="4.2" fill="#cc0000"/>
  <circle cx="16" cy="16" r="2"   fill="#ff4444"/>
</svg>
