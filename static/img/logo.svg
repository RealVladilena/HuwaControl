<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40">
  <defs>
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ff2222" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#cc0000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="40" height="40" rx="9" fill="#0d0d0d"/>
  <circle cx="20" cy="20" r="17" fill="url(#logoGlow)"/>

  <!-- Connection lines -->
  <line x1="20" y1="16" x2="20" y2="9"  stroke="#cc0000" stroke-width="1.6" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="31" y2="20" stroke="#cc0000" stroke-width="1.6" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="20" y1="24" x2="20" y2="31" stroke="#cc0000" stroke-width="1.6" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="9"  y2="20" stroke="#cc0000" stroke-width="1.6" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="20" cy="8"  r="2.8" fill="#cc0000" fill-opacity="0.65"/>
  <circle cx="32" cy="20" r="2.8" fill="#cc0000" fill-opacity="0.65"/>
  <circle cx="20" cy="32" r="2.8" fill="#cc0000" fill-opacity="0.65"/>
  <circle cx="8"  cy="20" r="2.8" fill="#cc0000" fill-opacity="0.65"/>

  <!-- Center node -->
  <circle cx="20" cy="20" r="5.2" fill="#cc0000"/>
  <circle cx="20" cy="20" r="2.5" fill="#ff4444"/>

  <!-- Text: HuwaControl -->
  <text x="50" y="15"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="700"
        fill="#ffffff" letter-spacing="-0.3">HuwaControl</text>
  <text x="50" y="29"
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="9" font-weight="500"
        fill="#555555" letter-spacing="1.8">NETWORK MONITOR</text>
</svg>
