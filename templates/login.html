<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — HuwaControl</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ── Page login ─────────────────────────────────────────────── */
    html, body { height: 100%; margin: 0; }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      position: relative;
      overflow: hidden;
    }

    /* Grille de fond animée */
    .login-page::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(204,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(204,0,0,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 20s linear infinite;
    }
    @keyframes grid-drift {
      0%   { background-position: 0 0; }
      100% { background-position: 48px 48px; }
    }

    /* Lueur rouge centrale */
    .login-page::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,0,0,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Carte principale */
    .login-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      margin: 16px;
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid rgba(204, 0, 0, 0.20);
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      overflow: hidden;
    }

    /* Barre rouge haut */
    .login-topbar {
      height: 3px;
      background: linear-gradient(90deg, #cc0000, #ff4444, #cc0000);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 0%; }
      50%       { background-position: 100% 0%; }
    }

    .login-body { padding: 36px 32px 32px; }

    /* Logo */
    .login-logo {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .login-logo__icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(204,0,0,0.15);
      border: 1px solid rgba(204,0,0,0.30);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #cc0000;
    }
    .login-logo__name {
      font-size: 1.35rem; font-weight: 700;
      color: #fff; letter-spacing: -0.3px;
    }
    .login-logo__sub {
      font-size: .78rem; color: #555;
      margin-top: -6px; letter-spacing: .5px;
      text-transform: uppercase;
    }

    /* Champs */
    .login-field { margin-bottom: 16px; }
    .login-field__label {
      display: block; font-size: .78rem; font-weight: 600;
      color: #666; text-transform: uppercase;
      letter-spacing: .6px; margin-bottom: 6px;
    }
    .login-field__wrap {
      position: relative;
    }
    .login-field__icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #444; font-size: .85rem; pointer-events: none;
    }
    .login-field__input {
      width: 100%; box-sizing: border-box;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      color: #eee; font-size: .92rem;
      padding: 11px 14px 11px 38px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .login-field__input:focus {
      border-color: rgba(204,0,0,0.60);
      box-shadow: 0 0 0 3px rgba(204,0,0,0.10);
    }
    .login-field__input::placeholder { color: #444; }

    /* Bouton afficher/masquer mot de passe */
    .login-field__toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: #444; font-size: .8rem; padding: 4px;
      transition: color .2s;
    }
    .login-field__toggle:hover { color: #888; }

    /* Erreur */
    .login-error {
      display: flex; align-items: center; gap: 8px;
      background: rgba(204,0,0,0.12);
      border: 1px solid rgba(204,0,0,0.30);
      border-radius: 8px; padding: 10px 14px;
      font-size: .84rem; color: #ff6666;
      margin-bottom: 18px;
    }

    /* Lockout countdown */
    .login-lockout {
      display: flex; align-items: center; gap: 8px;
      background: rgba(180,80,0,0.12);
      border: 1px solid rgba(180,80,0,0.30);
      border-radius: 8px; padding: 10px 14px;
      font-size: .84rem; color: #f5a800;
      margin-bottom: 18px;
    }

    /* Bouton submit */
    .login-btn {
      width: 100%; padding: 12px;
      background: #cc0000;
      border: none; border-radius: 8px;
      color: #fff; font-size: .95rem; font-weight: 600;
      cursor: pointer; letter-spacing: .3px;
      transition: background .2s, transform .1s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .login-btn:hover  { background: #ee1111; box-shadow: 0 4px 16px rgba(204,0,0,0.35); }
    .login-btn:active { transform: scale(.98); }
    .login-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

    /* Footer */
    .login-footer {
      padding: 14px 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: .73rem; color: #3a3a3a;
    }
    .login-footer .dot { color: rgba(204,0,0,0.40); }
  </style>
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-topbar"></div>
  <div class="login-body">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo__icon">
        <i class="fa-solid fa-network-wired"></i>
      </div>
      <div class="login-logo__name">HuwaControl</div>
      <div class="login-logo__sub">Network Dashboard</div>
    </div>

    <!-- Erreur / lockout -->
    {% if wait_secs and wait_secs > 0 %}
    <div class="login-lockout" id="lockout-banner">
      <i class="fa-solid fa-clock"></i>
      <span>Trop de tentatives — réessayez dans <strong id="countdown">{{ wait_secs }}</strong>s</span>
    </div>
    {% elif error %}
    <div class="login-error">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Formulaire -->
    <form method="POST" action="/login" autocomplete="on" id="login-form">
      <div class="login-field">
        <label class="login-field__label" for="username">Identifiant</label>
        <div class="login-field__wrap">
          <i class="fa-solid fa-user login-field__icon"></i>
          <input class="login-field__input" type="text" id="username" name="username"
                 autocomplete="username" placeholder="admin" required
                 {% if wait_secs and wait_secs > 0 %}disabled{% endif %}>
        </div>
      </div>

      <div class="login-field">
        <label class="login-field__label" for="password">Mot de passe</label>
        <div class="login-field__wrap">
          <i class="fa-solid fa-lock login-field__icon"></i>
          <input class="login-field__input" type="password" id="password" name="password"
                 autocomplete="current-password" placeholder="••••••••" required
                 {% if wait_secs and wait_secs > 0 %}disabled{% endif %}>
          <button type="button" class="login-field__toggle" id="toggle-pwd" tabindex="-1">
            <i class="fa-solid fa-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <button class="login-btn" type="submit" id="login-btn"
              {% if wait_secs and wait_secs > 0 %}disabled{% endif %}>
        <i class="fa-solid fa-right-to-bracket"></i>
        Se connecter
      </button>
    </form>

  </div>

  <div class="login-footer">
    <i class="fa-solid fa-shield-halved dot"></i>
    <span>Session chiffrée</span>
    <span style="margin:0 4px">·</span>
    <i class="fa-solid fa-lock dot"></i>
    <span>Accès restreint</span>
  </div>
</div>

<script>
// Afficher/masquer le mot de passe
const pwdInput = document.getElementById('password');
const eyeIcon  = document.getElementById('eye-icon');
document.getElementById('toggle-pwd')?.addEventListener('click', () => {
  const show = pwdInput.type === 'password';
  pwdInput.type   = show ? 'text' : 'password';
  eyeIcon.className = show ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
});

// Countdown lockout
const cdEl = document.getElementById('countdown');
if (cdEl) {
  let secs = parseInt(cdEl.textContent);
  const btn    = document.getElementById('login-btn');
  const timer  = setInterval(() => {
    secs--;
    cdEl.textContent = secs;
    if (secs <= 0) {
      clearInterval(timer);
      document.getElementById('lockout-banner').style.display = 'none';
      document.getElementById('username').disabled = false;
      document.getElementById('password').disabled = false;
      btn.disabled = false;
      document.getElementById('username').focus();
    }
  }, 1000);
}
</script>

</body>
</html>
