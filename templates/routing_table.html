{% extends "base.html" %}
{% block title %}Table de routage{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title"><i class="fa-solid fa-route"></i> Table de routage</h1>
  <span class="page-subtitle">Lecture SNMP en direct (ipRouteTable)</span>
</div>

<div class="toolbar" style="gap:8px">
  <button class="btn btn--primary" id="btn-refresh">
    <i class="fa-solid fa-rotate"></i> Actualiser
  </button>
  <input class="form-input" type="search" id="route-search"
         placeholder="Filtrer (dest, nexthop…)" style="max-width:260px">
  <span class="txt-muted" style="font-size:.85rem" id="route-count"></span>
</div>

<div class="card mt-4">
  <div class="card__body card__body--no-pad">
    <table class="table">
      <thead>
        <tr>
          <th>Destination</th>
          <th>Masque</th>
          <th>Passerelle</th>
          <th style="width:100px">Type</th>
          <th style="width:80px">Métrique</th>
          <th style="width:90px">Interface</th>
        </tr>
      </thead>
      <tbody id="route-tbody">
        <tr><td colspan="6" class="txt-muted txt-center">Cliquez sur Actualiser…</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allRoutes = [];

const TYPE_BADGE = {
  direct:   '<span class="badge badge--up">Direct</span>',
  indirect: '<span class="badge badge--neutral">Indirect</span>',
  other:    '<span class="badge" style="opacity:.6">Autre</span>',
};

function renderRoutes(filter) {
  const tbody = document.getElementById('route-tbody');
  let rows = allRoutes;
  if (filter) {
    const q = filter.toLowerCase();
    rows = rows.filter(r =>
      (r.dest||'').includes(q) ||
      (r.nexthop||'').includes(q) ||
      (r.mask||'').includes(q) ||
      (r.type||'').includes(q)
    );
  }
  document.getElementById('route-count').textContent = rows.length + ' route(s)';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="txt-muted txt-center">Aucune route</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="txt-mono" style="font-size:.88rem">${r.dest}</td>
      <td class="txt-mono" style="font-size:.88rem">${r.mask}</td>
      <td class="txt-mono" style="font-size:.88rem">${r.nexthop === '0.0.0.0' ? '<span class="txt-muted">—</span>' : r.nexthop}</td>
      <td>${TYPE_BADGE[r.type] || r.type}</td>
      <td class="txt-muted" style="font-size:.88rem">${r.metric ?? '—'}</td>
      <td class="txt-muted" style="font-size:.88rem">${r.if_index ?? '—'}</td>
    </tr>`).join('');
}

document.getElementById('route-search').addEventListener('input', e => renderRoutes(e.target.value));

function loadRoutes() {
  const btn  = document.getElementById('btn-refresh');
  const icon = btn.querySelector('i');
  icon.classList.add('fa-spin');
  btn.disabled = true;
  const rid = getActiveRouter();
  const url = '/api/routing-table' + (rid ? '?router_id=' + rid : '');
  fetch(url)
    .then(r => r.json())
    .then(d => {
      allRoutes = d;
      renderRoutes(document.getElementById('route-search').value);
    })
    .catch(console.error)
    .finally(() => { icon.classList.remove('fa-spin'); btn.disabled = false; });
}

document.getElementById('btn-refresh').addEventListener('click', loadRoutes);
document.addEventListener('routerChanged', loadRoutes);
loadRoutes();
</script>
{% endblock %}
